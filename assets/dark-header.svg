<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.5" stop-color="#07111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="line" x1="180" y1="40" x2="1020" y2="315" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)" opacity="0.8"/>
  <path d="M78 285 C230 155 320 310 465 188 C586 86 688 255 824 142 C935 50 1012 112 1125 70" stroke="url(#line)" stroke-width="4" opacity="0.85" filter="url(#glow)"/>
  <path d="M90 88 H247 M955 270 H1110 M126 252 H232 M940 102 H1076" stroke="#334155" stroke-width="2" stroke-linecap="round"/>

  <circle cx="78" cy="285" r="6" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="465" cy="188" r="6" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="824" cy="142" r="6" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="1125" cy="70" r="6" fill="#f97316" filter="url(#glow)"/>

  <rect x="300" y="83" width="600" height="194" rx="26" fill="#020617" opacity="0.78" stroke="#1e293b"/>
